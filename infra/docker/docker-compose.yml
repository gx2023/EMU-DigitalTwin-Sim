version: '3.8'

services:
  api-gateway:
    build:
      context: ../../src/backend/EMU.DT.ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - auth-service
      - data-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  auth-service:
    build:
      context: ../../src/backend/EMU.DT.AuthService
      dockerfile: Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  data-service:
    build:
      context: ../../src/backend/EMU.DT.DataService
      dockerfile: Dockerfile
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  nginx:
    build:
      context: ../../src/web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-gateway
