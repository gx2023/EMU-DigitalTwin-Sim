
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: emu-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: emu_auth_db,emu_data_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emu-network

  api-gateway:
    build:
      context: ../
      dockerfile: infra/Dockerfile.api-gateway
    container_name: emu-api-gateway
    ports:
      - "5000:8080"
    depends_on:
      - postgres
    networks:
      - emu-network

  auth-service:
    build:
      context: ../
      dockerfile: infra/Dockerfile.auth-service
    container_name: emu-auth-service
    ports:
      - "5001:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=emu_auth_db;Username=postgres;Password=postgres
    networks:
      - emu-network

  data-service:
    build:
      context: ../
      dockerfile: infra/Dockerfile.data-service
    container_name: emu-data-service
    ports:
      - "5002:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=emu_data_db;Username=postgres;Password=postgres
    networks:
      - emu-network

  simulation-service:
    build:
      context: ../
      dockerfile: infra/Dockerfile.simulation-service
    container_name: emu-simulation-service
    ports:
      - "5003:8080"
    depends_on:
      - postgres
    networks:
      - emu-network

  device-service:
    build:
      context: ../
      dockerfile: infra/Dockerfile.device-service
    container_name: emu-device-service
    ports:
      - "5004:8080"
    depends_on:
      - postgres
    networks:
      - emu-network

  algorithm-service:
    build:
      context: ../
      dockerfile: infra/Dockerfile.algorithm-service
    container_name: emu-algorithm-service
    ports:
      - "5005:8080"
    depends_on:
      - postgres
    networks:
      - emu-network

  notification-service:
    build:
      context: ../
      dockerfile: infra/Dockerfile.notification-service
    container_name: emu-notification-service
    ports:
      - "5006:8080"
    depends_on:
      - postgres
    networks:
      - emu-network

  file-service:
    build:
      context: ../
      dockerfile: infra/Dockerfile.file-service
    container_name: emu-file-service
    ports:
      - "5007:8080"
    depends_on:
      - postgres
    networks:
      - emu-network

volumes:
  postgres_data:

networks:
  emu-network:
    driver: bridge
